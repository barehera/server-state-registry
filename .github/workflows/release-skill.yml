name: Release skill

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: manage-react-server-state-release
  cancel-in-progress: false

jobs:
  release:
    name: Validate and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate registry and skill
        run: npm run validate

      - name: Analyze commits and release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run release
